<div class="stat-grid">
  {% for stat in stats %}
    {% if stat.url %}
      <a href="{{ stat.url }}"
         class="stat{% if stat.active %} stat--active{% endif %}{% if stat.variant %} stat--{{ stat.variant }}{% endif %}"
         {% if stat.active %}aria-current="true"{% endif %}>
        <span class="stat__value">{{ stat.value }}</span>
        <span class="stat__label">{{ stat.label }}</span>
      </a>
    {% else %}
      <div class="stat{% if stat.variant %} stat--{{ stat.variant }}{% endif %}">
        <span class="stat__value">{{ stat.value }}</span>
        <span class="stat__label">{{ stat.label }}</span>
      </div>
    {% endif %}
  {% endfor %}
</div>
